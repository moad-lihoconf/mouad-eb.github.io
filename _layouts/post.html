---
layout: default
---

<div class="page-container">
    <article class="prose">
        <div class="post-header">
            <p class="post-meta">{{ page.date | date: "%B %-d, %Y" }}{% if page.categories.size > 0 %} &middot; {{
                page.categories | join: ", " }}{% endif %}</p>
        </div>
        {{ content }}
    </article>
</div>
